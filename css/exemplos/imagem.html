<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <title>Imagem</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link href="../css-default.css" rel="stylesheet" type="text/css" />
        <link href="../../lib/prism/prism.css" rel="stylesheet" type="text/css" />
        <link href="../../lib/stylesheet/core.css" rel="stylesheet" type="text/css" />
        <link href="../../javascript/ModalShow/ModalShow.css" rel="stylesheet" type="text/css" />

        <script src="../../javascript/jsd/js-default.js" type="text/javascript"></script>
        <script src="../../javascript/ModalShow/ModalShow.js" type="text/javascript"></script>
        <script src="../../lib/js/mostar-codigo.js" type="text/javascript"></script>
        <script src="../../lib/prism/prism.js" type="text/javascript"></script>
    </head>
    <body>
        <header>
            <div class="bg-dark-grey padding-all text-white">
                <div class="container">
                    <h1 class="shadow-text-white margin-left-max">Imagem Responsiva</h1>
                </div>
            </div>
            <div class="bg-light padding-all shadow-box">
                <div class="container">
                    <ul class="list bold">
                        <li>image-auto</li>
                    </ul>
                </div>
            </div>
            <div class="container">
                <div class="margin-all-prop">
                    <blockquote class="quote-yellow margin-top">
                        <p>Redimencione a tela para auto ajustar os tamanhos das imagens</p>
                    </blockquote>
                </div>
            </div>
        </header>

        <main class="container padding-all">
            <section class="section">
                <h2>Auto ajuste de imagens</h2>
                <div class="margin-tb">
                    <img class="image-auto" src="../../lib/img/uracan.jpg" alt="image-auto" />
                </div>
                <div class="align-center">
                    <button class="btn-default radius-all-min shadow-box" data-code="">CÓDIGO HTML</button>
                </div>
            </section>

            <hr class="border-bottom-min border-dark" />
            <section class="section">
                <h2>Mais Exemplos</h2>
                <div class="margin-top-max">
                    <div class="row-pad">
                        <div class="col-half">
                            <img class="image-auto" src="../../lib/img/paisagem_01.jpg" alt="image-auto" />
                        </div>
                        <div class="col-half">
                            <img class="image-auto" src="../../lib/img/paisagem_02.jpg" alt="image-auto" />
                        </div>
                        <div class="col-third col-fix">
                            <img class="image-auto" src="../../lib/img/paisagem_03.jpg" alt="image-auto" />
                        </div>
                        <div class="col-third col-fix">
                            <img class="image-auto" src="../../lib/img/paisagem_04.jpg" alt="image-auto" />
                        </div>
                        <div class="col-third col-fix">
                            <img class="image-auto" src="../../lib/img/paisagem_05.jpg" alt="image-auto" />
                        </div>
                    </div>
                </div>
                <div class="margin-top margin-bottom-max align-center">
                    <button class="btn-default radius-all-min shadow-box" data-code="">CÓDIGO HTML</button>
                </div>
            </section>
        </main>

        <footer class="section bg-dark-grey">
            <div class="container center-content">
                <div class="align-center text-light font-min">
                    <p>Demonstração: <span class="italic bold">css-default.css</span></p>
                    <p><a href="https://github.com/Spell-Master/sm-web/" target="_blank" class="href">
                            https:&sol;&sol;github.com&sol;Spell-Master&sol;sm-web&sol;
                        </a></p>
                </div>
            </div>
            <div class="modal" id="show-code">
                <div class="modal-box">
                    <div class="modal-header"><span class="font-max">Código Fonte</span></div>
                    <div class="modal-content"><pre><code class="language-html"></code></pre></div>
                </div>
            </div>
        </footer>

        <script>showCode.init();</script>
    </body>
</html>
